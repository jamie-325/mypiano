<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Piano Virtuoso - Dual UI Edition</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
    <style>
        /* Desktop UI Styling */
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #desktop-hud { position: fixed; top: 20px; left: 20px; z-index: 999; pointer-events: none; }
        .ui-panel { 
            background: rgba(0, 0, 0, 0.8); padding: 15px; border-radius: 10px; 
            border: 1px solid #39FF14; pointer-events: auto; display: flex; flex-direction: column; gap: 8px; width: 220px;
        }
        button { 
            padding: 10px; cursor: pointer; background: #222; color: white; 
            border: 1px solid #444; border-radius: 5px; font-weight: bold; 
        }
        button:hover { background: #333; border-color: #39FF14; }
        .label { color: #39FF14; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="desktop-hud">
        <div class="ui-panel">
            <div class="label">Scale Selection</div>
            <button onclick="selectScale('cMajor')">C Major</button>
            <button onclick="selectScale('gMajor')">G Major</button>
            <button onclick="selectScale('dMajor')">D Major</button>
            
            <div class="label" style="margin-top:10px;">Execution</div>
            <button onclick="startSession(false)" style="color:#39FF14;">▶ Listen</button>
            <button onclick="startSession(true)" style="background:#1a4a1a;">🎯 Score Mode</button>
            <button onclick="stopAll()" style="color:#ff4444;">Stop</button>
        </div>
    </div>

    <a-scene background="color: #050510" xr-mode-ui="enabled: true">
        
        <a-assets>
            <a-mixin id="vr-btn" 
                     geometry="primitive: plane; width: 0.5; height: 0.18" 
                     material="color: #222; shader: flat"
                     event-set__mouseenter="material.color: #39FF14"
                     event-set__mouseleave="material.color: #222"
                     text="align: center; width: 2; color: white"></a-mixin>
        </a-assets>

        <a-entity laser-controls="hand: left" raycaster="objects: .clickable; far: 5"></a-entity>
        <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 5"></a-entity>

        <a-entity id="vr-menu" position="0 1.8 -1.5" rotation="15 0 0">
            <a-text value="VR CONTROL PANEL" position="0 0.45 0" align="center" width="3" color="#39FF14"></a-text>
            
            <a-entity class="clickable" mixin="vr-btn" position="-0.55 0.15 0" text="value: C MAJOR" onclick="selectScale('cMajor')"></a-entity>
            <a-entity class="clickable" mixin="vr-btn" position="0 0.15 0" text="value: G MAJOR" onclick="selectScale('gMajor')"></a-entity>
            <a-entity class="clickable" mixin="vr-btn" position="0.55 0.15 0" text="value: D MAJOR" onclick="selectScale('dMajor')"></a-entity>

            <a-entity class="clickable" mixin="vr-btn" position="-0.3 -0.1 0" text="value: LISTEN" onclick="startSession(false)"></a-entity>
            <a-entity class="clickable" mixin="vr-btn" position="0.3 -0.1 0" material="color: #1a4a1a" text="value: SCORE" onclick="startSession(true)"></a-entity>

            <a-text value="PIANO HEIGHT" position="0 -0.35 0" align="center" width="2" color="#aaa"></a-text>
            <a-entity class="clickable" mixin="vr-btn" position="-0.3 -0.5 0" geometry="width: 0.2" text="value: -" onclick="adjustHeight(-0.05)"></a-entity>
            <a-entity class="clickable" mixin="vr-btn" position="0.3 -0.5 0" geometry="width: 0.2" text="value: +" onclick="adjustHeight(0.05)"></a-entity>

            <a-entity class="clickable" mixin="vr-btn" position="0 -0.8 0" material="color: #500" text="value: STOP" onclick="stopAll()"></a-entity>
        </a-entity>

        <a-entity id="piano-rig" position="0 0.5 -1.8">
            <a-entity id="rolls"></a-entity>
            <a-entity id="keys"></a-entity>
        </a-entity>

        <a-camera position="0 1.6 0.5" wasd-controls-enabled="false" look-controls="enabled: true"></a-camera>
        <a-light type="ambient" intensity="0.8"></a-light>
    </a-scene>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const FALL_SPEED = 4.0; 
        const HIT_WINDOW = 200; 

        let keyMap = {}, keyPos = {}, activeRolls = [], scaleNotes = [];
        let playbackTimers = [], isScoring = false;
        let gameStart = 0, currentBPM = 90;

        const SCALE_LIB = {
            cMajor: [60,62,64,65,67,69,71,72,74,76,77,79,81,83,84],
            gMajor: [55,57,59,60,62,64,66,67,69,71,72,74,76,78,79],
            dMajor: [62,64,66,67,69,71,73,74,76,78,79,81,83,85,86]
        };

        function buildKeys() {
            let curX = 0;
            const keysEl = document.getElementById('keys');
            const WHITE_W = 0.085, BLACK_W = 0.05, GAP = 0.005;

            for(let n=21; n<=108; n++) {
                const isB = [1,3,6,8,10].includes(n%12);
                const k = document.createElement('a-box');
                let x = isB ? curX - (WHITE_W/2 + GAP/2) : curX;
                k.setAttribute('width', isB ? BLACK_W : WHITE_W);
                k.setAttribute('height', 0.1);
                k.setAttribute('depth', isB ? 0.4 : 0.75);
                k.setAttribute('color', isB ? '#111' : '#fff');
                k.setAttribute('position', `${x} ${isB ? 0.06 : 0} ${isB ? -0.15 : 0}`);
                keysEl.appendChild(k);
                keyMap[n] = k; keyPos[n] = x;
                if(!isB) curX += (WHITE_W + GAP);
            }
            keysEl.setAttribute('position', `${-(curX/2)} 0 0`);
        }

        // --- NEW: VR Height Adjustment ---
        function adjustHeight(delta) {
            const rig = document.getElementById('piano-rig');
            let pos = rig.getAttribute('position');
            pos.y += delta;
            rig.setAttribute('position', pos);
        }

        function selectScale(key) {
            const notes = SCALE_LIB[key];
            scaleNotes = [...notes, ...[...notes].reverse().slice(1)].map((n, i) => ({
                note: n, time: i * (60000 / currentBPM), claimed: false
            }));
            console.log("Active Scale Set to:", key);
        }

        function startSession(scoringMode) {
            if (scaleNotes.length === 0) return alert("Select a scale first!");
            stopAll();
            isScoring = scoringMode;
            gameStart = performance.now() + 2000;
            const msPerBeat = 60000 / currentBPM;

            scaleNotes.forEach((ev, i) => {
                const hitTime = gameStart + ev.time;
                spawnRoll(ev.note, true, hitTime);
                if (!isScoring) {
                    const t = setTimeout(() => playPiano(ev.note), hitTime - performance.now());
                    playbackTimers.push(t);
                }
            });
        }

        function spawnRoll(note, isPlayback, targetTime) {
            const b = document.createElement('a-box');
            const isB = [1,3,6,8,10].includes(note%12);
            b.setAttribute('width', isB ? 0.03 : 0.05);
            b.setAttribute('depth', 0.1);
            b.setAttribute('height', 0.5);
            const color = isPlayback ? '#FFD700' : '#00f0ff';
            b.setAttribute('color', color);
            b.setAttribute('material', 'emissive', color);
            
            const x = keyPos[note] + document.getElementById('keys').object3D.position.x;
            b.setAttribute('position', `${x} ${isPlayback ? 10 : 0} 0`);
            document.getElementById('rolls').appendChild(b);
            activeRolls.push({ note, el: b, isPlayback, hitTime: targetTime / 1000, x: x });
        }

        function playPiano(note) {
            const f = 440 * Math.pow(2, (note - 69) / 12);
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.frequency.value = f;
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.5);
        }

        function tick() {
            const now = performance.now() / 1000;
            activeRolls.forEach(obj => {
                let y = obj.isPlayback ? (obj.hitTime - now) * FALL_SPEED : (now - obj.hitTime) * FALL_SPEED;
                obj.el.object3D.position.set(obj.x, y + 0.2, 0);
            });
            activeRolls = activeRolls.filter(o => {
                if (now - o.hitTime > 2.0) { o.el.remove(); return false; }
                return true;
            });
            requestAnimationFrame(tick);
        }

        function stopAll() {
            playbackTimers.forEach(clearTimeout);
            playbackTimers = [];
            activeRolls.forEach(o => o.el.remove());
            activeRolls = [];
        }

        window.onload = () => {
            buildKeys();
            tick();
            navigator.requestMIDIAccess().then(access => {
                access.inputs.forEach(input => {
                    input.onmidimessage = (m) => {
                        const [s, n, v] = m.data;
                        if ((s & 0xf0) === 0x90 && v > 0) {
                            playPiano(n);
                            spawnRoll(n, false, performance.now());
                        }
                    };
                });
            });
        };
    </script>
</body>
</html>
